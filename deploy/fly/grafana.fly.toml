app = "gitstream-grafana-demo"
primary_region = "iad"

[build]
  dockerfile = "../../deploy/fly/grafana/Dockerfile"

[env]
  GF_SERVER_HTTP_PORT = "3000"
  GF_SECURITY_ADMIN_USER = "admin"
  GF_USERS_ALLOW_SIGN_UP = "false"
  GF_AUTH_ANONYMOUS_ENABLED = "false"
  PROMETHEUS_URL = "http://gitstream-prometheus-demo.internal:9090"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "grafana_data"
  destination = "/var/lib/grafana"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

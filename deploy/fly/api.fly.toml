app = "gitstream-api-demo"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "../../cmd/api/Dockerfile"

[env]
  API_PORT = "8090"
  POSTGRES_PORT = "5432"
  POSTGRES_DB = "gitstream"
  POSTGRES_USER = "gitstream"
  CLICKHOUSE_NATIVE_PORT = "9000"
  CLICKHOUSE_DB = "gitstream"
  CLICKHOUSE_USER = "gitstream"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

app = "gitstream-prometheus-demo"
primary_region = "iad"

[build]
  dockerfile = "../../deploy/fly/prometheus/Dockerfile"

[env]
  INGEST_METRICS_TARGET = "gitstream-ingest-demo.internal:8080"
  PROCESSOR_METRICS_TARGET = "gitstream-processor-demo.internal:8091"
  API_METRICS_TARGET = "gitstream-api-demo.internal:8090"

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

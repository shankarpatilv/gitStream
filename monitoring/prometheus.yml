global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
  - job_name: gitstream-ingest
    static_configs:
      - targets:
          - host.docker.internal:8080
  - job_name: gitstream-processor
    static_configs:
      - targets:
          - host.docker.internal:8091
  - job_name: gitstream-api
    static_configs:
      - targets:
          - host.docker.internal:8090
